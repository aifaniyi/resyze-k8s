apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: resyze-apps
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/aifaniyi/resyze-k8s.git
    targetRevision: main
    path: apps
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: resyze
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
