apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: resyze-api
  namespace: resyze
  labels:
    app: resyze-api
    release: kube-prometheus-stack # Must match the Helm release name of your kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app: resyze-api
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
  namespaceSelector:
    matchNames:
      - resyze

