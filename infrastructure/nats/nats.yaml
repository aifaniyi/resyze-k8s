# NATS with JetStream enabled for durable message streaming between services.
# Single replica is sufficient for this deployment; scale to a 3-node cluster
# with a NATS Helm chart if you need HA.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nats
  namespace: resyze
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nats
  template:
    metadata:
      labels:
        app: nats
    spec:
      containers:
        - name: nats
          image: nats:2.10-alpine
          args:
            - "--jetstream"           # Enable JetStream persistence
            - "--http_port=8222"      # Enable monitoring endpoint
            - "--store_dir=/data"     # JetStream storage directory
          ports:
            - name: client
              containerPort: 4222
            - name: monitoring
              containerPort: 8222
          volumeMounts:
            - name: nats-data
              mountPath: /data
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8222
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
      volumes:
        - name: nats-data
          emptyDir: {}   # Replace with a PVC if JetStream durability across pod restarts is required

---
apiVersion: v1
kind: Service
metadata:
  name: nats
  namespace: resyze
spec:
  selector:
    app: nats
  ports:
    - name: client
      port: 4222
      targetPort: 4222
    - name: monitoring
      port: 8222
      targetPort: 8222
