# ConfigMap with init SQL to enable required extensions.
# Scripts in /docker-entrypoint-initdb.d/ run on first DB initialization only.
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: resyze
data:
  init-extensions.sql: |
    CREATE EXTENSION IF NOT EXISTS pg_trgm;

---
# Persistent volume claim for Postgres data.
# Uses the default k3s local-path provisioner; replace storageClassName
# with your preferred class if you have Longhorn or another CSI driver.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: resyze
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 10Gi

---
# StatefulSet keeps pod identity stable across restarts, which is
# required for a single-node Postgres without a replication setup.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: resyze
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_DB
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: postgres-init
              mountPath: /docker-entrypoint-initdb.d
          # Liveness probe restarts the pod if Postgres stops accepting connections.
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres"]
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-pvc
        - name: postgres-init
          configMap:
            name: postgres-init

---
# ClusterIP service — Postgres is only reachable inside the cluster.
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: resyze
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
