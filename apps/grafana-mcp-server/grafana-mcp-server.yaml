apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana-mcp-server
  namespace: resyze
  labels:
    app: grafana-mcp-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana-mcp-server
  template:
    metadata:
      labels:
        app: grafana-mcp-server
    spec:
      containers:
        - name: grafana-mcp-server
          image: mcp/grafana:latest
          args:
            - -address=0.0.0.0:8080
            - -allowed-hosts=*
          ports:
            - containerPort: 8080
          env:
            - name: GRAFANA_URL
              value: "http://kube-prometheus-stack-grafana.monitoring.svc.cluster.local"
            - name: GRAFANA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: grafana-mcp-secret
                  key: GRAFANA_API_KEY
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: grafana-mcp-server
  namespace: resyze
  labels:
    app: grafana-mcp-server
spec:
  selector:
    app: grafana-mcp-server
  ports:
    - name: http
      port: 8080
      targetPort: 8080

