apiVersion: apps/v1
kind: Deployment
metadata:
  name: resyze-app
  namespace: resyze
  labels:
    app: resyze-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: resyze-app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: resyze-app
    spec:
      imagePullSecrets:
        - name: registry-secret
      containers:
        - name: resyze-app
          image: nexus.aoilabs.net:8443/aifaniyi/resyze-app:40
          ports:
            - containerPort: 80
          env:
            # NGINX_HOST is consumed by the resyze.conf.template at container start.
            - name: NGINX_HOST
              value: "resyze.aoilabs.net"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi

---
apiVersion: v1
kind: Service
metadata:
  name: resyze-app
  namespace: resyze
spec:
  selector:
    app: resyze-app
  ports:
    - port: 80
      targetPort: 80
